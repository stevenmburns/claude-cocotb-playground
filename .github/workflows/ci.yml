name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git help2man perl python3 make autoconf g++ flex bison ccache \
            libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev \
            zlib1g zlib1g-dev lcov

      - name: Cache Verilator install
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: verilator-5.046-ubuntu-latest

      - name: Build and install Verilator
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/verilator/verilator
          cd verilator
          git checkout v5.046
          autoconf
          ./configure --prefix=$HOME/.local
          make -j$(nproc)
          make install

      - name: Add Verilator to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install cocotb pytest hypothesis vcdvcd

      - name: Run GCD tests
        run: pytest gcd/test_runner.py -v --tb=short

      - name: Run FIFO tests
        run: pytest fifo/test_runner.py -v --tb=short

      - name: Run FPGA GCD tests
        env:
          COCOTB_WAVES: "0"
        run: pytest fpga/shrike/uart_gcd/test_runner.py -v --tb=short

      - name: Run SPI GCD tests
        env:
          COCOTB_WAVES: "0"
        run: pytest fpga/shrike/spi_gcd/test_runner.py -v --tb=short

      - name: Run I2C GCD tests
        env:
          COCOTB_WAVES: "0"
        run: pytest fpga/shrike/i2c_gcd/test_runner.py -v --tb=short

      - name: Upload waveform
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcd-waveform
          path: gcd/sim_build/dump.vcd

      - name: Generate HTML coverage report
        if: always()
        run: |
          genhtml gcd/sim_build/coverage.info \
            --output-directory gcd/sim_build/coverage_html \
            --title "GCD Coverage"

      - name: Upload GCD coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcd-coverage
          path: |
            gcd/sim_build/coverage_annotated/
            gcd/sim_build/coverage_html/

      - name: Upload FIFO coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fifo-coverage
          path: fifo/sim_build/

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: gcd/sim_build/coverage_html

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-build-log
          path: |
            gcd/sim_build/build.log
            fifo/sim_build/*/build.log
            fpga/shrike/uart_gcd/sim_build/build.log
            fpga/shrike/spi_gcd/sim_build/build.log
            fpga/shrike/i2c_gcd/sim_build/build.log

  deploy-pages:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
